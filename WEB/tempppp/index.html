<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Network Routing Using Floyd’s Algorithm</h1>
        
        <h2>Initial Distance Matrix (in km)</h2>
        <div id="initial-matrix"></div>

        <button id="calculate-btn">Calculate All Shortest Paths</button>

        <h2>All-Pairs Shortest Path Matrix (in km)</h2>
        <div id="result-matrix"></div>
        <p class="note">Note: 'INF' means there is no direct or indirect path.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
